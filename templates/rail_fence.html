<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rail Fence Cipher</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">RAIL FENCE CIPHER</h2>
        
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">ENCRYPTION</div>
            <div class="card-body">
                <form action="/railfence/encrypt" method="POST">
                    <div class="form-group">
                        <label for="plainText">Plain text:</label>
                        <input type="text" class="form-control" id="plainText" name="plainText" value="{{ plainText or '' }}" required>
                    </div>
                    <div class="form-group">
                        <label for="key">Key (Number of Rails):</label>
                        <input type="number" class="form-control" id="key" name="key" value="{{ key or '' }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Encrypt</button>
                </form>
                {% if encryptedText %}
                <div class="mt-3">
                    <strong>Result:</strong>
                    <div class="alert alert-info mt-2">{{ encryptedText }}</div>
                </div>
                {% endif %}
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-success text-white">DECRYPTION</div>
            <div class="card-body">
                <form action="/railfence/decrypt" method="POST">
                    <div class="form-group">
                        <label for="cipherText">Cipher text:</label>
                        <input type="text" class="form-control" id="cipherText" name="cipherText" value="{{ cipherText or '' }}" required>
                    </div>
                    <div class="form-group">
                        <label for="keyD">Key (Number of Rails):</label>
                        <input type="number" class="form-control" id="keyD" name="key" value="{{ key or '' }}" required>
                    </div>
                    <button type="submit" class="btn btn-success">Decrypt</button>
                </form>
                {% if decryptedText %}
                <div class="mt-3">
                    <strong>Result:</strong>
                    <div class="alert alert-info mt-2">{{ decryptedText }}</div>
                </div>
                {% endif %}
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="/caesar" class="btn btn-outline-secondary">Caesar</a>
            <a href="/playfair" class="btn btn-outline-secondary">Playfair</a>
            <a href="/vigenere" class="btn btn-outline-secondary">Vigenere</a>
            <a href="/transposition" class="btn btn-outline-secondary">Transposition</a>
        </div>
    </div>
</body>
</html>
